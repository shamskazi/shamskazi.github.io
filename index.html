<!DOCTYPE html>
<html>
    <head>
        <title>My Example</title>
        <style>
            body {
              animation:1s blinker linear infinite;
              -webkit-animation:1s blinker linear infinite;
              -moz-animation:1s blinker linear infinite;

               color: red;
              }

              @-moz-keyframes blinker {
               0% { opacity: .5; }
               50% { opacity: 0.0; }
               100% { opacity: .5; }
               }

              @-webkit-keyframes blinker {
               0% { opacity: .5; }
               50% { opacity: 0.0; }
               100% { opacity: .5; }
               }

              @keyframes blinker {
               0% { opacity: .5; }
               50% { opacity: 0.0; }
               100% { opacity: .5; }
            }
            h1 {
                color: coral;
            }
            #intro {
                font-size: 1.3em;
            }
            .colorful {
                color: red;
            }
        </style>
    </head>
    <body>
        <h1>Welcome AJtJP.com Visitors!</h1>
    </body>
</html>
